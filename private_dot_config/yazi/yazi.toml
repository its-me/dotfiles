[tasks]
image_bound = [0, 0]

[open]
rules = [
  { mime = "application/pdf", use = "chrome" },
  { mime = "message/rfc822", use = "chrome" },
  { url = "*.mhtml", use = "chrome" },
  { url = "*.mht", use = "chrome" },
  { mime = "text/html", use = "chrome" },
  { url = "*.html", use = "chrome" },
  { url = "*.htm", use = "chrome" },
  { mime = "video/mp4", use = "mpv" },
  { url = "*.mp4", use = "mpv" },
  { mime = "video/x-matroska", use = "mpv" },
  { url = "*.mkv", use = "mpv" },
  { mime = "video/x-msvideo", use = "mpv" },
  { url = "*.avi", use = "mpv" },
  { mime = "video/quicktime", use = "mpv" },
  { url = "*.mov", use = "mpv" },
  { mime = "video/webm", use = "mpv" },
  { url = "*.webm", use = "mpv" },
  { mime = "video/x-flv", use = "mpv" },
  { url = "*.flv", use = "mpv" },
  { mime = "video/x-ms-wmv", use = "mpv" },
  { url = "*.wmv", use = "mpv" },
  { mime = "image/*", use = "vui" },
]

[opener]
chrome = [
  { run = 'google-chrome-stable "$@"', orphan = true, desc = "Open in Chrome" }
]
mpv = [
  { run = 'mpv "$@"', orphan = true, desc = "Play in mpv" }
]
vui = [
  { run = 'viu "$1"', desc = "viu", block = true }
]

[plugin]
prepend_previewers = [
    { url = "*.csv", run = 'piper -- rich -j --left --guides --line-numbers --force-terminal "$1"' },
    { url = "*.md", run = 'piper -- rich -j --left --guides --line-numbers --force-terminal "$1"' },
    { url = "*.rst", run = 'piper -- rich -j --left --guides --line-numbers --force-terminal "$1"' },
    { url = "*.ipynb", run = 'piper -- rich -j --left --guides --line-numbers --force-terminal "$1"' },
    { url = "*.json", run = 'piper -- rich -j --left --guides --line-numbers --force-terminal "$1"' },
]
